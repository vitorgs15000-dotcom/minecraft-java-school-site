<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft Command Quest</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="topbar">
      <div>
        <p class="eyebrow">Minecraft Java Command Quest</p>
        <h1>Aprenda comandos jogando</h1>
      </div>
      <div class="hud">
        <span>Fase <b id="levelNumber">1</b></span>
        <span>XP <b id="xp">0</b></span>
        <span>FPS <b id="fps">--</b></span>
      </div>
    </section>

    <section class="stage">
      <aside class="mission">
        <h2 id="missionTitle">Missao</h2>
        <p id="missionText"></p>
        <div class="objective" id="objectiveText"></div>
        <div class="tips">
          <b>Dicas</b>
          <ul id="tips"></ul>
        </div>
      </aside>

      <div class="world-panel">
        <div id="world" class="world" aria-label="Mundo do jogo"></div>
        <div id="toast" class="toast">Digite um comando para jogar.</div>
      </div>

      <aside class="book">
        <h2>Livro de comandos</h2>
        <div id="commandBook"></div>
      </aside>
    </section>

    <section class="console">
      <span class="prompt">&gt;</span>
      <input id="commandInput" autocomplete="off" spellcheck="false" placeholder="/give @p minecraft:torch 8">
      <button id="runCommand">Executar</button>
    </section>

    <section class="low-spec">
      <label><input id="lowMode" type="checkbox" checked> Modo Athlon X2 / 4GB RAM</label>
      <span>Sem canvas pesado, sem 3D, sem download. Roda direto no navegador.</span>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
